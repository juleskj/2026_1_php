upstream app {
    server web:80;
}

server {
    listen 80;    
    
    # Skjul nginx version fra headers
    server_tokens off;

    # Begræns request størrelse (beskytter mod store uploads der omgår PHP)
    client_max_body_size 12M;

    # Tilføj security headers her også
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://app;

        # Send rigtig IP videre til PHP som bruges i login og admin page
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

}